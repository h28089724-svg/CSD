<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체인/스프라켓 검색</title>

    <link rel="manifest" href="./manifest.json">

    <!-- [수정] 테마 색상 -->
    <meta name="theme-color" content="#91a6bf">

    <style>
        :root {
            /* =========================
               [핵심 수정] 전체 컬러
               ========================= */
            --bg-main: rgba(145,166,191,0.5);  /* 배경 */
            --text-main: #1f2a35;              /* 텍스트 */

            /* 버튼 (배경보다 진하게) */
            --btn-bg: rgba(145,166,191,0.7);
            --btn-border: rgba(145,166,191,0.9);
        }

        @keyframes buttonImageFloat3D {
            0% { transform: rotateX(10deg) rotateY(-18deg) translateY(0px) scale(1); }
            25% { transform: rotateX(10deg) rotateY(-8deg) translateY(-2px) scale(1.01); }
            50% { transform: rotateX(10deg) rotateY(0deg) translateY(-4px) scale(1.03); }
            75% { transform: rotateX(10deg) rotateY(8deg) translateY(-2px) scale(1.01); }
            100% { transform: rotateX(10deg) rotateY(18deg) translateY(0px) scale(1); }
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            max-width: 800px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }

        .intro-card {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .top-content {
            width: 100%;
            padding-top: 8px;
        }

        .hero-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin: 6px 0 60px;
        }

        /* [수정] 브랜드 태그 */
        .brand-tag {
            min-width: 112px;
            height: 38px;
            padding: 0 24px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(145,166,191,0.7);
            color: #ffffff;
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* [수정] 타이틀 */
        .main-title {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 900;
            color: #1f2a35;
            letter-spacing: -0.05em;
            line-height: 1.2;
        }

        .mode-list {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .mode-btn {
            width: 144px;
            height: 144px;
            border: 1px solid var(--btn-border);
            border-radius: 20px;
            background: var(--btn-bg);
            color: #1f2a35;
            padding: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 800px;
            transition: all 0.22s ease;
        }

        /* [수정] hover 강조 */
        .mode-btn:hover,
        .mode-btn.active {
            background: rgba(145,166,191,0.9);
            color: #ffffff;
            border-color: rgba(145,166,191,1);
            transform: translateY(-6px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }

        .mode-image {
            display: block;
            width: 84px;
            margin-bottom: 8px;
            pointer-events: none;
            transform-style: preserve-3d;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.2));
            animation: buttonImageFloat3D 3.2s ease-in-out infinite alternate;
        }

        .chain-image { width: 96px; }

        .mode-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
        }

        .middle-image-zone {
            display: flex;
            justify-content: center;
            padding: 28px 0 24px;
        }

        .page-bg-image {
            width: 420px;
            max-width: 78%;
            opacity: 0.2;
        }

        .bottom-brand {
            margin-top: auto;
            text-align: center;
        }

        .bottom-brand-name {
            min-width: 132px;
            height: 42px;
            padding: 0 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f3aa1a, #ffbf3c);
            color: #fff;
            font-size: 1.55rem;
            font-weight: 900;
        }

        /* [수정] 하단 텍스트 */
        .bottom-sub {
            margin-top: 10px;
            font-size: 0.82rem;
            color: rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="intro-card">
            <div class="top-content">
                <div class="hero-header">
                    <div class="brand-tag">C&S</div>
                    <h1 class="main-title">체인/스프라켓 검색</h1>
                </div>

                <div class="mode-list">
                    <button class="mode-btn" onclick="selectAndGo(this, 'sprocket_main.html')">
                        <img src="./images/sprocket.png" class="mode-image">
                        <div class="mode-title">스프라켓</div>
                    </button>

                    <button class="mode-btn" onclick="selectAndGo(this, 'chain_main.html')">
                        <img src="./images/chain.png" class="mode-image chain-image">
                        <div class="mode-title">체인</div>
                    </button>
                </div>
            </div>

            <div class="middle-image-zone">
                <img src="./images/RS50_IMAGE.png" class="page-bg-image">
            </div>

            <div class="bottom-brand">
                <div class="bottom-brand-name">MYCAD</div>
                <div class="bottom-sub">Speed & Simple Data Search</div>
            </div>
        </div>
    </div>

    <script>
        function selectAndGo(el, url) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            el.classList.add('active');

            setTimeout(() => {
                window.location.href = url;
            }, 150);
        }
    </script>
</body>
</html>
