<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체인규격검색</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3e8aae">

    <style>
        :root {
            --accent-main: rgb(62, 138, 174);
            --accent-soft: rgba(62, 138, 174, 0.15);
            --accent-border: rgba(62, 138, 174, 0.34);

            --bg-top: #e8f5fb;
            --bg-bottom: #d7ebf4;

            --text-main: #133241;
            --text-sub: rgba(19, 50, 65, 0.72);

            /* 패널과 버튼을 흰색이 아니라 같은 계열로 통일 */
            --panel-bg: rgba(62, 138, 174, 0.08);
            --panel-border: rgba(62, 138, 174, 0.22);

            --btn-bg: rgba(62, 138, 174, 0.16);
            --btn-border: rgba(62, 138, 174, 0.28);

            --btn-hover-bg: var(--accent-main);
            --btn-hover-text: #ffffff;

            --home-btn-bg: rgba(62, 138, 174, 0.12);
            --home-btn-border: rgba(62, 138, 174, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background:
                radial-gradient(circle at top, rgba(62, 138, 174, 0.25), transparent 55%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            display: flex;
            justify-content: center;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            max-width: 800px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 18px;
        }

        .hero-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-tag {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            color: var(--accent-main);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
        }

        .main-title {
            margin: 10px 0 6px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .main-sub {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .menu-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(62, 138, 174, 0.10);
            backdrop-filter: blur(4px);
        }

        .mode-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mode-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            color: var(--text-main);
        }

        .mode-btn:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            transform: translateY(-4px);
            box-shadow: 0 18px 36px rgba(62, 138, 174, 0.30);
        }

        .mode-image {
            width: 60px;
            height: auto;
            flex: 0 0 auto;
            filter: drop-shadow(0 6px 12px rgba(62, 138, 174, 0.20));
        }

        .mode-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mode-title {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.2;
            margin: 0 0 4px 0;
        }

        .mode-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin: 0;
        }

        .mode-btn:hover .mode-desc {
            color: rgba(255, 255, 255, 0.82);
        }

        .middle-image-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-bg-image {
            width: 260px;
            max-width: 66%;
            opacity: 0.10;
            pointer-events: none;
            user-select: none;
        }

        .bottom-area {
            margin-top: auto;
            text-align: center;
        }

        .home-btn {
            margin-top: 10px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--home-btn-border);
            background: var(--home-btn-bg);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            color: var(--accent-main);
            font-size: 0.92rem;
            font-weight: 500;
        }

        .home-btn:hover {
            background: var(--accent-main);
            color: #ffffff;
        }

        .bottom-brand {
            margin-top: 14px;
        }

        .bottom-brand-name {
            font-weight: 800;
            color: var(--accent-main);
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .bottom-sub {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        @media (max-width: 560px) {
            .page {
                padding: 18px 12px;
            }

            .main-title {
                font-size: 1.55rem;
            }

            .main-sub {
                font-size: 0.86rem;
            }

            .menu-panel {
                padding: 14px;
                border-radius: 18px;
            }

            .mode-btn {
                padding: 14px;
                gap: 14px;
                border-radius: 14px;
            }

            .mode-image {
                width: 52px;
            }

            .mode-title {
                font-size: 0.98rem;
            }

            .mode-desc {
                font-size: 0.8rem;
            }

            .page-bg-image {
                width: 220px;
                max-width: 72%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero-header">
            <div class="brand-tag">CHAIN MENU</div>
            <div class="main-title">체인 선택</div>
            <div class="main-sub">용도에 맞는 항목을 선택하세요</div>
        </div>

        <div class="menu-panel">
            <div class="mode-list">
                <button class="mode-btn" onclick="selectAndGo(this, 'RS_chain.html')">
                    <img src="./images/chain.png" alt="RS체인 이미지" class="mode-image">
                    <div class="mode-text">
                        <div class="mode-title">동력전달용</div>
                        <p class="mode-desc">일반 구동용 체인 검색</p>
                    </div>
                </button>

                <button class="mode-btn" onclick="selectAndGo(this, 'CV_chain.html')">
                    <img src="./images/icon_data_3.png" alt="CV체인 이미지" class="mode-image">
                    <div class="mode-text">
                        <div class="mode-title">컨베이어용</div>
                        <p class="mode-desc">컨베이어 체인 검색</p>
                    </div>
                </button>
            </div>
        </div>

        <div class="middle-image-zone" aria-hidden="true">
            <img src="./images/chain.png" alt="" class="page-bg-image">
        </div>

        <div class="bottom-area">
            <button class="home-btn" onclick="goHome()">🏠 홈으로</button>

            <div class="bottom-brand" aria-label="브랜드 정보">
                <div class="bottom-brand-name">MYCAD</div>
                <div class="bottom-sub">Speed &amp; Simple Data Search</div>
            </div>
        </div>
    </div>

    <script>
        function selectAndGo(el, url) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            el.classList.add('active');

            setTimeout(() => {
                window.location.href = url;
            }, 150);
        }

        function goHome() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
